# Alert rules — the longevity early-warnings. Each rule runs a SQL query over a
# recent window (data lands ~one drive late, so windows are days not minutes),
# reduces it to a single value, and thresholds it. Evaluated every 10 min.
#
# Windows are intentionally wide because the Pi syncs once per drive: a drive's
# data appears at the START of the next drive, so a 3-day window reliably catches
# the latest synced drive regardless of when you next drive.
apiVersion: 1

groups:
  - orgId: 1
    name: longevity
    folder: Alerts
    interval: 10m
    rules:
      # --- Coolant overheating -------------------------------------------------
      - uid: p300k-coolant-high
        title: Coolant overheating
        condition: C
        for: 5m
        labels:
          severity: high
        annotations:
          summary: 'Coolant peaked at {{ index $values "B" }}°C in the last 3 days (limit 110°C).'
        data:
          - refId: A
            relativeTimeRange: { from: 259200, to: 0 }
            datasourceUid: project300k
            model:
              refId: A
              datasource: { type: postgres, uid: project300k }
              format: table
              rawSql: "SELECT max(coolant_temp_c) AS value FROM obd_5s WHERE timestamp > now() - interval '3 days'"
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              datasource: { type: __expr__, uid: __expr__ }
              expression: B
              conditions:
                - evaluator: { type: gt, params: [110] }

      # --- Transmission overheating -------------------------------------------
      - uid: p300k-trans-high
        title: Transmission overheating
        condition: C
        for: 5m
        labels:
          severity: high
        annotations:
          summary: 'Transmission fluid peaked at {{ index $values "B" }}°C in the last 3 days (limit 120°C).'
        data:
          - refId: A
            relativeTimeRange: { from: 259200, to: 0 }
            datasourceUid: project300k
            model:
              refId: A
              datasource: { type: postgres, uid: project300k }
              format: table
              rawSql: "SELECT max(trans_temp_c) AS value FROM ford_obd_5s WHERE timestamp > now() - interval '3 days'"
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              datasource: { type: __expr__, uid: __expr__ }
              expression: B
              conditions:
                - evaluator: { type: gt, params: [120] }

      # --- Charging fault (alternator never reaches charging voltage) ----------
      - uid: p300k-charging-fault
        title: Charging fault
        condition: C
        for: 5m
        labels:
          severity: high
        annotations:
          summary: 'Battery never exceeded {{ index $values "B" }}V over 3 days — alternator may not be charging (healthy is 13.5–14.7V running).'
        data:
          - refId: A
            relativeTimeRange: { from: 259200, to: 0 }
            datasourceUid: project300k
            model:
              refId: A
              datasource: { type: postgres, uid: project300k }
              format: table
              rawSql: "SELECT max(battery_v) AS value FROM obd_30s WHERE timestamp > now() - interval '3 days'"
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              datasource: { type: __expr__, uid: __expr__ }
              expression: B
              conditions:
                - evaluator: { type: lt, params: [13.0] }

      # --- Battery weakening (consistently low, not a cranking blip) -----------
      - uid: p300k-battery-weak
        title: Battery weakening
        condition: C
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Battery 10th-percentile voltage is {{ index $values "B" }}V over 7 days (watch below 12.0V) — battery may be aging.'
        data:
          - refId: A
            relativeTimeRange: { from: 604800, to: 0 }
            datasourceUid: project300k
            model:
              refId: A
              datasource: { type: postgres, uid: project300k }
              format: table
              rawSql: "SELECT percentile_cont(0.10) WITHIN GROUP (ORDER BY battery_v) AS value FROM obd_30s WHERE timestamp > now() - interval '7 days' AND battery_v IS NOT NULL"
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              datasource: { type: __expr__, uid: __expr__ }
              expression: B
              conditions:
                - evaluator: { type: lt, params: [12.0] }

      # --- Oil pressure low ----------------------------------------------------
      - uid: p300k-oil-pressure-low
        title: Oil pressure low
        condition: C
        for: 5m
        labels:
          severity: high
        annotations:
          summary: 'Oil pressure 5th-percentile is {{ index $values "B" }}kPa over 3 days (floor 200kPa, normal 290–396) — investigate.'
        data:
          - refId: A
            relativeTimeRange: { from: 259200, to: 0 }
            datasourceUid: project300k
            model:
              refId: A
              datasource: { type: postgres, uid: project300k }
              format: table
              rawSql: "SELECT percentile_cont(0.05) WITHIN GROUP (ORDER BY oil_pressure_kpa) AS value FROM ford_obd_10s WHERE timestamp > now() - interval '3 days' AND oil_pressure_kpa IS NOT NULL"
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              datasource: { type: __expr__, uid: __expr__ }
              expression: B
              conditions:
                - evaluator: { type: lt, params: [200] }

      # --- Knock retard (engine pulling timing) --------------------------------
      - uid: p300k-knock-retard
        title: Knock retard high
        condition: C
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Knock retard peaked at {{ index $values "B" }}° over 3 days (watch above 6°) — check fuel quality / carbon.'
        data:
          - refId: A
            relativeTimeRange: { from: 259200, to: 0 }
            datasourceUid: project300k
            model:
              refId: A
              datasource: { type: postgres, uid: project300k }
              format: table
              rawSql: "SELECT max(knock_retard_deg) AS value FROM ford_obd_10s WHERE timestamp > now() - interval '3 days'"
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              datasource: { type: __expr__, uid: __expr__ }
              expression: B
              conditions:
                - evaluator: { type: gt, params: [6] }

      # --- Misfire rate elevated ----------------------------------------------
      # Rate = misfires ÷ combustion events (drive-length independent). Events =
      # revolutions × 2 for a 4-cyl 4-stroke; revolutions = Σrpm/60, so events =
      # Σrpm/30. Per-drive sums kept aligned (numerator and denominator over the
      # same drives). Warn at 0.5% — the ECU only sets a DTC near ~2%.
      - uid: p300k-misfires
        title: Misfire rate elevated
        condition: C
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: 'Misfire rate is {{ index $values "B" }}% over 3 days (warn above 0.5%; a DTC sets near 2%) — check plugs / coils / fuel.'
        data:
          - refId: A
            relativeTimeRange: { from: 259200, to: 0 }
            datasourceUid: project300k
            model:
              refId: A
              datasource: { type: postgres, uid: project300k }
              format: table
              rawSql: "WITH per AS (SELECT t.id, (SELECT sum(rpm)/30.0 FROM obd_1s o WHERE o.trip_id=t.id AND o.rpm IS NOT NULL) AS events, (SELECT COALESCE(max(misfire_acc_cyl1),0)+COALESCE(max(misfire_acc_cyl2),0)+COALESCE(max(misfire_acc_cyl3),0)+COALESCE(max(misfire_acc_cyl4),0) FROM ford_obd_20s m WHERE m.trip_id=t.id) AS mis FROM trips t WHERE t.start_time > now() - interval '3 days') SELECT COALESCE(sum(mis) / NULLIF(sum(events),0) * 100, 0) AS value FROM per"
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              datasource: { type: __expr__, uid: __expr__ }
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.5] }

      # --- Fuel trim drifting --------------------------------------------------
      # LTFT is how much the ECU corrects fuelling. A sustained drift beyond ±10%
      # flags an intake/vacuum leak, a failing MAF, or aging injectors — often
      # months before a lean/rich DTC (which sets near ±25%).
      - uid: p300k-fuel-trim-drift
        title: Fuel trim drifting
        condition: C
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Long-term fuel trim averaged {{ index $values "B" }}% over 3 days (watch beyond ±10%) — check for an intake leak / failing MAF.'
        data:
          - refId: A
            relativeTimeRange: { from: 259200, to: 0 }
            datasourceUid: project300k
            model:
              refId: A
              datasource: { type: postgres, uid: project300k }
              format: table
              rawSql: "SELECT avg(ltft_pct) AS value FROM obd_5s WHERE timestamp > now() - interval '3 days' AND ltft_pct IS NOT NULL"
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              datasource: { type: __expr__, uid: __expr__ }
              expression: B
              conditions:
                - evaluator: { type: outside_range, params: [-10, 10] }

      # --- New DTC fault code --------------------------------------------------
      - uid: p300k-dtc-new
        title: New DTC fault code
        condition: C
        for: 0m
        labels:
          severity: high
        annotations:
          summary: '{{ index $values "B" }} diagnostic trouble code(s) logged in the last 3 days — check the DTC list.'
        data:
          - refId: A
            relativeTimeRange: { from: 259200, to: 0 }
            datasourceUid: project300k
            model:
              refId: A
              datasource: { type: postgres, uid: project300k }
              format: table
              rawSql: "SELECT count(*) AS value FROM dtc_events WHERE timestamp > now() - interval '3 days'"
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              datasource: { type: __expr__, uid: __expr__ }
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
